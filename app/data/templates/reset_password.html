<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Intelligence System - Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/styles.css') }}">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Reset Password Page Styles */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--color-bg);
        }

        .reset-password-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 20px;
        }

        .reset-password-card {
            background-color: var(--color-bg-secondary);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--color-border);
        }

        .reset-password-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .reset-password-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-text);
            margin: 0 0 10px 0;
            font-family: 'Poppins', sans-serif;
        }

        .reset-password-header p {
            font-size: 14px;
            color: var(--color-text-secondary);
            margin: 0;
        }

        .reset-password-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--color-text);
            display: block;
        }

        .password-input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            font-size: 14px;
            background-color: var(--color-bg-secondary);
            color: var(--color-text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            box-sizing: border-box;
            transition: all var(--transition-speed);
        }

        .password-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background-color: var(--color-bg-secondary);
        }

        .password-input::placeholder {
            color: var(--color-text-light);
        }

        .reset-new-password-btn {
            width: 100%;
            padding: 11px 16px;
            background-color: var(--color-primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-speed);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin-top: 8px;
        }

        .reset-new-password-btn:hover {
            background-color: var(--color-primary-dark);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .reset-new-password-btn:active {
            transform: translateY(0);
        }

        .reset-new-password-btn:disabled {
            background-color: var(--color-text-light);
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Navbar override for reset page */
        .navbar {
            box-shadow: var(--shadow-sm);
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .reset-password-card {
                padding: 30px 20px;
            }

            .reset-password-header h1 {
                font-size: 24px;
            }

            .reset-password-header p {
                font-size: 12px;
            }
        }
    </style>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-left">
            <div class="logo">
                <span class="logo-text">Civic Intelligence System</span>
            </div>
        </div>
    </nav>

    <!-- Reset Password Container -->
    <div class="reset-password-container">
        <div class="reset-password-card">
            <div class="reset-password-header">
                <h1>Reset Password</h1>
            </div>
            
            <form class="reset-password-form">
                <div class="form-group">
                    <label for="passwordInput">New Password</label>
                    <input 
                        type="hidden" 
                        class="token-input" 
                        id="tokenInput" 
                        value="{{token}}"
                    >
                    <input 
                        type="password" 
                        class="password-input" 
                        id="passwordInput" 
                        placeholder="Enter your new password"
                        name="password"
                        autocomplete="new-password"
                        required
                    >
                </div>

                <button type="submit" class="reset-new-password-btn">Reset Password</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', path='js/script.js') }}"></script>
</body>
</html>
